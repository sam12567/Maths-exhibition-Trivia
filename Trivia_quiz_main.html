<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Trivia Quiz</title>

<style>

body{
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    background: linear-gradient(
        to right,
        #FF8C00,
        #ff008c,
        #1956d9
    );

    font-family: Arial, sans-serif;
    overflow: hidden;
}

.main-menu{
    display: flex;
    flex-direction: column;
    align-items: center;
}

.top-text{
 
    font-size: 1.3rem;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 10px;

    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    background: linear-gradient(to right,
    #00f7ff,
    #c9f80d);
    -webkit-background-clip:text;
    -webkit-text-fill-color: transparent;
    
    
    
}

.heading{
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-weight: bold;
    text-align: center;
    font-size: 4rem;

    background: linear-gradient(
        to right,
        #ffffff,
        #ffe600
    );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    margin-bottom: 10px;
}

.abt1{
    color: white;
    text-align: center;
    font-size: 1.1rem;
    width: 80%;
    max-width: 700px;

    margin-bottom: 40px;
}

.btn{
    width: 240px;
    padding: 15px;
    margin: 10px;

    border: none;
    border-radius: 14px;

    font-size: 1.2rem;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s ease;

    color: white;
}

.levels{ background: #00c853; }
.settings{ background: #1a1a1a; }

.btn:hover{
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(0,0,0,0.35);
}

.level-screen{
    display: none;
    flex-direction: column;
    align-items: center;
}

.level-btn{
    width: 260px;
    padding: 16px;
    margin: 12px;

    border: none;
    border-radius: 14px;

    font-size: 1.3rem;
    font-weight: bold;

    cursor: pointer;
    transition: 0.3s;
}

.easy{
    background: #00e676;
    color: black;
}

.medium{
    background: #ffd600;
    color: black;
}

.hard{
    background: #ff1744;
    color: white;
    
}

.back{
    background: white;
    color: black;
    margin-top: 25px;
}

.level-btn:hover{
    transform: scale(1.06);
}

.placeholder-screen{
    display: none;

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: black;

    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.placeholder-text{
    font-size: 4rem;
    font-weight: bold;

    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    letter-spacing: 6px;

    background: linear-gradient(
        to right,
        #8fd3ff,
        #b8a1ff,
        #1b2a4a
    );

    -webkit-background-clip: text;
    background-clip: text;

    -webkit-text-fill-color: transparent;
    color: transparent;
}

</style>
</head>

<body>

<div class="main-menu" id="mainMenu">

    <p class="top-text">
        Who Wants To Be A Maths Millionaire?
    </p>

    <header class="heading">
        Trivia Quiz
    </header>

    <p class="abt1">
        This is a school project made by Samridh,
        Hridyansh, Aksh, and Anirudh.
    </p>

    <button class="btn levels" onclick="showLevels()">
        Levels
    </button>

    <button class="btn settings" onclick="openSettings()">
        Settings
    </button>

</div>

<div class="level-screen" id="levelScreen">

    <button class="level-btn easy" onclick="openPlaceholder()">
         Easy
    </button>

    <button class="level-btn medium" onclick="openPlaceholder()">
         Medium
    </button>

    <button class="level-btn hard" onclick="openPlaceholder()">
         Hard
    </button>

    <button class="level-btn back" onclick="goBack()">
        ⬅ Back
    </button>

</div>

<div class="placeholder-screen" id="placeholderScreen">

    <button class="level-btn back"
        onclick="backToLevels()"
        style="position:absolute;top:20px;left:20px;width:120px;padding:10px;font-size:1rem;">
        ⬅ Back
    </button>

    <div class="placeholder-text">
        PLACE HOLDER
    </div>

</div>

<script>

function showLevels(){
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("levelScreen").style.display = "flex";
}

function goBack(){
    document.getElementById("levelScreen").style.display = "none";
    document.getElementById("mainMenu").style.display = "flex";
}

function openSettings(){
    alert("Settings menu coming soon!");
}

function openPlaceholder(){
    document.getElementById("levelScreen").style.display = "none";
    document.getElementById("placeholderScreen").style.display = "flex";
}

function backToLevels(){
    document.getElementById("placeholderScreen").style.display = "none";
    document.getElementById("levelScreen").style.display = "flex";
}

</script>

</html>
